apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: jenkins
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: jenkins
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "3Gi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 15
        - name: model-puller
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until OLLAMA_HOST=http://localhost:11434 ollama list >/dev/null 2>&1; do
                sleep 2
              done
              if ! OLLAMA_HOST=http://localhost:11434 ollama list 2>/dev/null | grep -q "llama3.2:1b"; then
                echo "Model not found, pulling..."
                OLLAMA_HOST=http://localhost:11434 ollama pull llama3.2:1b
              else
                echo "Model already present, skipping pull."
              fi
              echo "Model ready. Sleeping forever to keep sidecar alive."
              sleep infinity
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: jenkins
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434