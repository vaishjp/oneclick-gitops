apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-admin-secret
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: jenkins-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: oneclick/jenkins-admin
        property: password