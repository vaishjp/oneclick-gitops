    agent:
      podTemplates:
        dind: |
          - name: dind-agent
            label: dind-agent
            serviceAccount: jenkins
            yaml: |
              apiVersion: v1
              kind: Pod
              spec:
                initContainers:
                - name: trivy-install
                  image: aquasec/trivy:0.65.0
                  command: ["sh", "-c", "cp /usr/local/bin/trivy /shared-bin/trivy"]
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: aws-cli-install
                  image: amazon/aws-cli:2
                  command:
                  - sh
                  - -c
                  - |
                    cp /usr/local/bin/aws /shared-bin/aws || \
                    cp /usr/local/aws-cli/v2/current/bin/aws /shared-bin/aws
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: kubectl-install
                  image: bitnami/kubectl:1.35
                  command: ["sh", "-c", "cp /opt/bitnami/kubectl/bin/kubectl /shared-bin/kubectl"]
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                containers:
                - name: docker
                  image: docker:24-dind
                  command:
                  - sh
                  - -c
                  - |
                    cp /usr/local/bin/docker /shared-bin/docker
                    dockerd-entrypoint.sh
                  securityContext:
                    privileged: true
                  env:
                  - name: DOCKER_TLS_CERTDIR
                    value: ""
                  resources:
                    requests:
                      cpu: "500m"
                      memory: "1Gi"
                    limits:
                      cpu: "2"
                      memory: "2Gi"
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                - name: jnlp
                  image: jenkins/inbound-agent:latest
                  env:
                  - name: DOCKER_HOST
                    value: "tcp://localhost:2375"
                  - name: PATH
                    value: "/shared-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                  volumeMounts:
                  - name: shared-bin
                    mountPath: /shared-bin

                volumes:
                - name: shared-bin
                  emptyDir: {}